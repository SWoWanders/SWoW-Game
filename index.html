<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Steve's Ottawa — Prototype</title>
<style>
  :root{
    --ink:#1f2318;
    --paper:#eee7d8;
    --paper2:#e2d9c4;
    --line:#8a8060;
    --accent:#c1542c;
    --accent2:#3f6b4f;
    --gold:#b9922a;
    --danger:#a3312a;
    --card:#f6f1e4;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--ink);
    font-family:'Courier New', Courier, monospace;
    color:var(--ink);
    overflow:hidden;
  }
  #app{
    position:relative;
    width:100%;height:100%;
    display:flex;flex-direction:column;
  }

  /* ---------- HUD ---------- */
  #hud{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--ink);
    color:var(--paper);
    padding:10px 14px;
    font-size:14px;
    letter-spacing:0.5px;
    border-bottom:3px solid var(--gold);
    z-index:10;
  }
  #hud .hud-block{display:flex;align-items:center;gap:6px;}
  #hud .label{opacity:0.6;font-size:10px;text-transform:uppercase;}
  #clock-value{font-weight:bold;font-size:16px;letter-spacing:1px;}
  #clock-value.hidden-time{color:var(--danger);}
  #clock-value.hidden-time::after{content:"— : —";}
  #clock-value.hidden-time{font-size:0;}
  #clock-value.hidden-time::after{font-size:16px;}
  .battery-wrap{display:flex;align-items:center;gap:4px;}
  .battery-shell{
    width:34px;height:16px;border:2px solid var(--paper);border-radius:2px;
    position:relative;padding:1px;
  }
  .battery-shell::after{
    content:"";position:absolute;right:-5px;top:4px;width:3px;height:6px;background:var(--paper);
  }
  .battery-fill{height:100%;background:var(--accent2);transition:width .3s;}
  .battery-fill.low{background:var(--gold);}
  .battery-fill.dead{background:var(--danger);width:100% !important;opacity:0.3;}
  #money-value{font-weight:bold;color:var(--gold);}
  #rec-indicator{
    display:flex;align-items:center;gap:5px;font-size:11px;
    padding:3px 8px;border:1px solid var(--paper);border-radius:10px;
  }
  #rec-indicator.active{color:var(--danger);border-color:var(--danger);}
  #rec-dot{width:8px;height:8px;border-radius:50%;background:#555;}
  #rec-indicator.active #rec-dot{background:var(--danger);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* ---------- Views ---------- */
  #view-container{flex:1;position:relative;overflow:hidden;background:var(--paper);}
  .view{
    position:absolute;inset:0;
    display:none;
    flex-direction:column;
  }
  .view.active{display:flex;}

  /* Transit map view */
  #transit-view .view-title{
    padding:10px 14px 4px;font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:.7;
  }
  #transit-canvas-wrap{flex:1;position:relative;}
  #transit-canvas{width:100%;height:100%;display:block;}
  .hub-btn{
    position:absolute;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:3px;
    cursor:pointer;background:none;border:none;
    color:var(--ink);font-family:inherit;
  }
  .hub-btn .dot{
    width:22px;height:22px;border-radius:50%;
    background:var(--card);border:3px solid var(--line);
  }
  .hub-btn.current .dot{background:var(--accent);border-color:var(--ink);}
  .hub-btn .dot-label{font-size:10px;font-weight:bold;background:var(--card);padding:2px 5px;border:1px solid var(--line);border-radius:3px;white-space:nowrap;}

  /* Neighbourhood view */
  #neighbourhood-view .view-title{
    padding:10px 14px 4px;font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:.7;
  }
  #nbhd-canvas-wrap{flex:1;position:relative;padding:10px;}
  .loc-btn{
    position:absolute;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;background:none;border:none;font-family:inherit;
  }
  .loc-icon{
    width:44px;height:44px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;color:var(--paper);
    border:2px solid var(--ink);
    box-shadow:2px 2px 0 rgba(0,0,0,0.15);
  }
  .loc-icon.home{background:#5b7a9a;}
  .loc-icon.museum{background:#7a5b9a;}
  .loc-icon.mall{background:#c1542c;}
  .loc-icon.cafe{background:#8a5a3a;}
  .loc-icon.landmark{background:#3f6b4f;}
  .loc-label{font-size:10px;font-weight:bold;background:var(--card);padding:2px 5px;border:1px solid var(--line);border-radius:3px;white-space:nowrap;}
  .loc-outlet-badge{
    position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--ink);
    font-size:9px;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--ink);
  }
  #steve-sprite{
    position:absolute;width:28px;height:28px;border-radius:50%;
    background:var(--accent);border:3px solid var(--ink);
    transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;color:var(--paper);font-weight:bold;
    transition:left .4s, top .4s;
    z-index:5;
  }

  /* Travel overlay */
  #travel-overlay{
    position:absolute;inset:0;background:rgba(31,35,24,0.92);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    color:var(--paper);z-index:20;gap:14px;text-align:center;padding:20px;
  }
  #travel-overlay.active{display:flex;}
  #travel-bar-shell{width:70%;max-width:320px;height:10px;background:#3a3f2e;border-radius:6px;overflow:hidden;}
  #travel-bar-fill{height:100%;width:0%;background:var(--gold);}
  #travel-eta{font-size:12px;opacity:.75;}
  #skip-travel-btn{
    margin-top:8px;background:none;border:1px solid var(--paper);color:var(--paper);
    padding:6px 14px;border-radius:4px;font-family:inherit;cursor:pointer;font-size:12px;
  }

  /* Location action panel */
  #action-panel{
    position:absolute;left:0;right:0;bottom:0;
    background:var(--card);border-top:3px solid var(--ink);
    padding:14px;display:none;flex-direction:column;gap:8px;
    max-height:60%;overflow-y:auto;z-index:15;
  }
  #action-panel.active{display:flex;}
  #action-panel h3{margin:0 0 4px;font-size:15px;}
  #action-panel .sub{font-size:11px;opacity:.65;margin-bottom:6px;}
  .action-row{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{
    font-family:inherit;font-size:12px;padding:9px 12px;border-radius:5px;
    border:2px solid var(--ink);background:var(--paper);cursor:pointer;
    display:flex;align-items:center;gap:6px;
  }
  .btn.primary{background:var(--accent2);color:var(--paper);}
  .btn.gold{background:var(--gold);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.close-btn{margin-left:auto;background:none;border:none;font-size:16px;padding:4px 8px;}
  #action-log{font-size:11px;opacity:.7;min-height:14px;}

  /* Toast */
  #toast{
    position:absolute;top:60px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);padding:8px 16px;border-radius:5px;
    font-size:12px;z-index:30;opacity:0;pointer-events:none;transition:opacity .3s;
    border:1px solid var(--gold);
  }
  #toast.show{opacity:1;}

  svg.route-line{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
</style>
</head>
<body>
<div id="app">

  <div id="hud">
    <div class="hud-block">
      <span class="label">TIME</span>
      <span id="clock-value">7:00 AM</span>
    </div>
    <div class="hud-block battery-wrap">
      <span class="label">BATT</span>
      <div class="battery-shell"><div id="battery-fill" class="battery-fill" style="width:100%"></div></div>
      <span id="battery-pct" style="font-size:11px;">100%</span>
    </div>
    <div class="hud-block">
      <span class="label">$</span>
      <span id="money-value">60</span>
    </div>
    <div id="rec-indicator"><span id="rec-dot"></span><span id="rec-label">idle</span></div>
  </div>

  <div id="view-container">

    <!-- TRANSIT MAP VIEW -->
    <div id="transit-view" class="view active">
      <div class="view-title">Transit Map — tap a neighbourhood to travel</div>
      <div id="transit-canvas-wrap">
        <svg class="route-line" id="route-svg"></svg>
        <!-- hub buttons injected by JS -->
      </div>
    </div>

    <!-- NEIGHBOURHOOD VIEW -->
    <div id="neighbourhood-view" class="view">
      <div class="view-title" id="nbhd-title">Neighbourhood</div>
      <div id="nbhd-canvas-wrap">
        <div id="steve-sprite">S</div>
        <!-- location buttons injected by JS -->
      </div>
      <button class="btn primary" id="back-to-transit-btn" style="margin:10px 14px;align-self:flex-start;">&larr; Back to Transit Map</button>
    </div>

    <!-- TRAVEL OVERLAY -->
    <div id="travel-overlay">
      <div id="travel-headline">Traveling…</div>
      <div id="travel-bar-shell"><div id="travel-bar-fill"></div></div>
      <div id="travel-eta">0 of 0 min</div>
      <button id="skip-travel-btn">Skip &raquo;</button>
    </div>

    <!-- ACTION PANEL -->
    <div id="action-panel">
      <div class="action-row">
        <h3 id="action-title">Location</h3>
        <button class="btn close-btn" id="close-action-btn">✕</button>
      </div>
      <div class="sub" id="action-sub"></div>
      <div class="action-row" id="action-buttons"></div>
      <div id="action-log"></div>
    </div>

  </div>

  <div id="toast"></div>
</div>

<script>
/* =========================================================
   STEVE'S OTTAWA — PROTOTYPE
   Placeholder-sprite build. All visuals here (colored dots,
   emoji icons) are stand-ins. See steve_sprite_sheet_template.png
   for the grid to draw real sprites into — cell coordinates
   are referenced in the SPRITE_MAP comment at the bottom.
   ========================================================= */

// ---------- TIME CONFIG ----------
// 1 real hour of normal play = 10 game hours -> 1 game-minute passes every 6 real seconds.
const GAME_MIN_PER_REAL_SEC = 10 / 6 / 10; // = 1/6 game-min per real-sec (10 game-hr/real-hr)
const DAY_START_MIN = 7 * 60;   // 7:00 AM
const DAY_END_MIN   = 23 * 60;  // 11:00 PM curfew (design TBD, placeholder)

// ---------- BATTERY CONFIG ----------
const BATTERY_DRAIN_PER_GAME_MIN = 100 / (10 * 60); // battery lasts ~10 game-hours of normal drain
const RECORD_DRAIN_MULTIPLIER = 2.2; // recording drains faster than idle
const CHARGER_PRICE = 35;
const CHARGER_USES_MAX = 5;

// ---------- WORLD DATA ----------
// Hub layout is stylised, not geographically exact.
const hubs = [
  { id:"carlington", name:"Carlington / Exp. Farm", x:0.12, y:0.72 },
  { id:"southkeys",  name:"South Keys / Billings Bridge", x:0.30, y:0.90 },
  { id:"glebe",      name:"The Glebe / Lansdowne", x:0.34, y:0.62 },
  { id:"downtown",   name:"Downtown / ByWard Market", x:0.52, y:0.40 },
  { id:"lebreton",   name:"LeBreton Flats", x:0.36, y:0.30 },
  { id:"newedin",    name:"New Edinburgh / Rockcliffe", x:0.66, y:0.22 },
  { id:"gatineau",   name:"Gatineau (Museum of History)", x:0.58, y:0.14 },
  { id:"eastend",    name:"East End / Aviation Museum", x:0.90, y:0.30 },
];

// Simplified "most common route" edges with EXACT placeholder minute costs.
// Replace these numbers with real OC Transpo route data later.
const routes = [
  ["carlington","glebe",15],
  ["carlington","southkeys",18],
  ["carlington","lebreton",15],
  ["glebe","downtown",12],
  ["glebe","southkeys",12],
  ["downtown","lebreton",8],
  ["downtown","newedin",15],
  ["downtown","gatineau",10],
  ["downtown","eastend",30],
  ["newedin","gatineau",8],
  ["newedin","eastend",20],
];

// Locations within each hub. type drives placeholder icon/color.
const locations = {
  carlington: [
    { id:"steve-house", name:"Steve's House", type:"home", x:0.5, y:0.55, outlet:true, isHome:true },
    { id:"exp-farm", name:"Central Experimental Farm", type:"landmark", x:0.75, y:0.3, outlet:false },
  ],
  southkeys: [
    { id:"billings-estate", name:"Billings Estate Museum", type:"museum", x:0.3, y:0.35, outlet:true },
    { id:"billings-mall", name:"Billings Bridge Shopping Centre", type:"mall", x:0.65, y:0.6, outlet:true, sellsCharger:true },
  ],
  glebe: [
    { id:"lansdowne", name:"Lansdowne Park", type:"landmark", x:0.4, y:0.4, outlet:false },
    { id:"glebe-cafe", name:"Bank St. Café", type:"cafe", x:0.65, y:0.65, outlet:true },
  ],
  downtown: [
    { id:"byward", name:"ByWard Market", type:"landmark", x:0.3, y:0.3, outlet:false },
    { id:"national-gallery", name:"National Gallery of Canada", type:"museum", x:0.6, y:0.25, outlet:true },
    { id:"downtown-cafe", name:"Sparks St. Café", type:"cafe", x:0.55, y:0.65, outlet:true },
  ],
  lebreton: [
    { id:"war-museum", name:"Canadian War Museum", type:"museum", x:0.5, y:0.5, outlet:true },
  ],
  newedin: [
    { id:"rideau-hall", name:"Rideau Hall", type:"landmark", x:0.4, y:0.4, outlet:false },
    { id:"newedin-cafe", name:"New Edinburgh Café", type:"cafe", x:0.65, y:0.6, outlet:true },
  ],
  gatineau: [
    { id:"museum-history", name:"Canadian Museum of History", type:"museum", x:0.4, y:0.4, outlet:true },
    { id:"art-walk", name:"Art Walk (Eiffel Bridge)", type:"landmark", x:0.65, y:0.6, outlet:false },
  ],
  eastend: [
    { id:"aviation-museum", name:"Canada Aviation & Space Museum", type:"museum", x:0.5, y:0.5, outlet:true },
  ],
};

const ICON_GLYPH = { home:"🏠", museum:"🏛", mall:"🛍", cafe:"☕", landmark:"📍" };

// ---------- STATE ----------
const state = {
  gameMin: DAY_START_MIN,
  money: 60,
  battery: 100,
  hasPortableCharger: false,
  chargerUsesLeft: 0,
  currentHub: "carlington",
  currentLocation: "steve-house",
  isRecording: false,
  inTransit: false,
};

// ---------- DOM ----------
const clockEl = document.getElementById("clock-value");
const battFillEl = document.getElementById("battery-fill");
const battPctEl = document.getElementById("battery-pct");
const moneyEl = document.getElementById("money-value");
const recIndicator = document.getElementById("rec-indicator");
const recLabel = document.getElementById("rec-label");

const transitView = document.getElementById("transit-view");
const transitWrap = document.getElementById("transit-canvas-wrap");
const routeSvg = document.getElementById("route-svg");

const nbhdView = document.getElementById("neighbourhood-view");
const nbhdWrap = document.getElementById("nbhd-canvas-wrap");
const nbhdTitle = document.getElementById("nbhd-title");
const steveSprite = document.getElementById("steve-sprite");

const travelOverlay = document.getElementById("travel-overlay");
const travelHeadline = document.getElementById("travel-headline");
const travelBarFill = document.getElementById("travel-bar-fill");
const travelEta = document.getElementById("travel-eta");
const skipTravelBtn = document.getElementById("skip-travel-btn");

const actionPanel = document.getElementById("action-panel");
const actionTitle = document.getElementById("action-title");
const actionSub = document.getElementById("action-sub");
const actionButtons = document.getElementById("action-buttons");
const actionLog = document.getElementById("action-log");
const closeActionBtn = document.getElementById("close-action-btn");
const backToTransitBtn = document.getElementById("back-to-transit-btn");
const toastEl = document.getElementById("toast");

// ---------- UTIL ----------
function formatClock(min){
  min = Math.floor(min) % (24*60);
  let h = Math.floor(min/60);
  const m = min%60;
  const ampm = h>=12 ? "PM":"AM";
  h = h%12; if(h===0) h=12;
  return `${h}:${m.toString().padStart(2,"0")} ${ampm}`;
}
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>toastEl.classList.remove("show"), 2200);
}
function graph(){
  const g = {};
  hubs.forEach(h=>g[h.id]=[]);
  routes.forEach(([a,b,min])=>{
    g[a].push({to:b, min});
    g[b].push({to:a, min});
  });
  return g;
}
const G = graph();
function shortestPath(from,to){
  const dist = {}, prev = {}, visited = new Set();
  hubs.forEach(h=>dist[h.id]=Infinity);
  dist[from]=0;
  while(true){
    let u=null, best=Infinity;
    for(const h of hubs){ if(!visited.has(h.id) && dist[h.id]<best){ best=dist[h.id]; u=h.id; } }
    if(u===null) break;
    if(u===to) break;
    visited.add(u);
    for(const edge of G[u]){
      const nd = dist[u]+edge.min;
      if(nd < dist[edge.to]){ dist[edge.to]=nd; prev[edge.to]=u; }
    }
  }
  if(dist[to]===Infinity) return null;
  const path=[to];
  let cur=to;
  while(cur!==from){ cur=prev[cur]; path.unshift(cur); }
  return { path, totalMin: dist[to] };
}

// ---------- RENDER: HUD ----------
function renderHUD(){
  if(state.battery <= 0){
    clockEl.classList.add("hidden-time");
  } else {
    clockEl.classList.remove("hidden-time");
    clockEl.textContent = formatClock(state.gameMin);
  }
  const pct = Math.max(0, Math.round(state.battery));
  battPctEl.textContent = state.battery<=0 ? "DEAD" : pct+"%";
  battFillEl.style.width = Math.max(0,pct)+"%";
  battFillEl.className = "battery-fill" + (state.battery<=0 ? " dead" : state.battery<25 ? " low":"");
  moneyEl.textContent = "$"+state.money;
  recIndicator.classList.toggle("active", state.isRecording);
  recLabel.textContent = state.isRecording ? "recording" : "idle";
}

// ---------- RENDER: TRANSIT MAP ----------
function renderTransitMap(){
  transitWrap.querySelectorAll(".hub-btn").forEach(el=>el.remove());
  routeSvg.innerHTML = "";
  const rect = transitWrap.getBoundingClientRect();

  routes.forEach(([a,b])=>{
    const ha = hubs.find(h=>h.id===a), hb = hubs.find(h=>h.id===b);
    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1", ha.x*rect.width);
    line.setAttribute("y1", ha.y*rect.height);
    line.setAttribute("x2", hb.x*rect.width);
    line.setAttribute("y2", hb.y*rect.height);
    line.setAttribute("stroke", "#8a8060");
    line.setAttribute("stroke-width", "2");
    line.setAttribute("stroke-dasharray", "4 3");
    routeSvg.appendChild(line);
  });

  hubs.forEach(h=>{
    const btn = document.createElement("button");
    btn.className = "hub-btn" + (h.id===state.currentHub ? " current":"");
    btn.style.left = (h.x*100)+"%";
    btn.style.top = (h.y*100)+"%";
    btn.innerHTML = `<div class="dot"></div><div class="dot-label">${h.name}</div>`;
    btn.addEventListener("click", ()=>onHubTapped(h.id));
    transitWrap.appendChild(btn);
  });
}

function onHubTapped(hubId){
  if(hubId === state.currentHub){
    enterNeighbourhood(hubId);
    return;
  }
  const result = shortestPath(state.currentHub, hubId);
  if(!result){ showToast("No route found."); return; }
  startTravel(hubId, result.totalMin, result.path);
}

// ---------- TRAVEL ----------
let travelTimer = null;
function startTravel(destHubId, totalMin, path){
  state.inTransit = true;
  travelOverlay.classList.add("active");
  const destHub = hubs.find(h=>h.id===destHubId);
  travelHeadline.textContent = `Traveling to ${destHub.name}`;
  travelBarFill.style.width = "0%";
  let elapsed = 0;
  travelEta.textContent = `0 of ${totalMin} min`;

  function finish(){
    clearInterval(travelTimer);
    travelOverlay.classList.remove("active");
    state.inTransit = false;
    state.currentHub = destHubId;
    state.currentLocation = null;
    renderTransitMap();
    enterNeighbourhood(destHubId);
  }
  skipTravelBtn.onclick = ()=>{
    // Skip still charges the full exact game-time cost, it just fast-forwards the wait.
    state.gameMin += (totalMin - elapsed);
    drainBattery(totalMin - elapsed);
    finish();
  };

  // Transit charges its EXACT specified minutes to the game clock (no compression/
  // invention of numbers), but animates at a fixed ~250ms-per-game-minute pace so the
  // player isn't stuck waiting in real time. Skip fast-forwards it entirely.
  const MS_PER_TRANSIT_GAME_MIN = 250;
  travelTimer = setInterval(()=>{
    elapsed += 1;
    state.gameMin += 1;
    drainBattery(1);
    renderHUD();
    const pct = Math.min(100, (elapsed/totalMin)*100);
    travelBarFill.style.width = pct+"%";
    travelEta.textContent = `${elapsed} of ${totalMin} min`;
    if(elapsed >= totalMin){
      finish();
    }
  }, MS_PER_TRANSIT_GAME_MIN);
}

// ---------- RENDER: NEIGHBOURHOOD ----------
function enterNeighbourhood(hubId){
  transitView.classList.remove("active");
  nbhdView.classList.add("active");
  const hub = hubs.find(h=>h.id===hubId);
  nbhdTitle.textContent = hub.name;
  renderNeighbourhood(hubId);
}
function renderNeighbourhood(hubId){
  nbhdWrap.querySelectorAll(".loc-btn").forEach(el=>el.remove());
  const locs = locations[hubId] || [];
  locs.forEach(loc=>{
    const btn = document.createElement("button");
    btn.className = "loc-btn";
    btn.style.left = (loc.x*100)+"%";
    btn.style.top = (loc.y*100)+"%";
    btn.innerHTML = `
      <div class="loc-icon ${loc.type}">
        ${ICON_GLYPH[loc.type]||"?"}
        ${loc.outlet ? '<span class="loc-outlet-badge">⚡</span>':""}
      </div>
      <div class="loc-label">${loc.name}</div>
    `;
    btn.addEventListener("click", ()=>openLocation(hubId, loc));
    nbhdWrap.appendChild(btn);
  });
  // place Steve sprite at current location if in this hub, else at first location
  const at = locs.find(l=>l.id===state.currentLocation) || locs[0];
  if(at){
    steveSprite.style.left = (at.x*100)+"%";
    steveSprite.style.top = (at.y*100)+"%";
  }
}

document.getElementById("back-to-transit-btn").addEventListener("click", ()=>{
  nbhdView.classList.remove("active");
  transitView.classList.add("active");
  renderTransitMap();
});

// ---------- LOCATION ACTIONS ----------
function openLocation(hubId, loc){
  state.currentLocation = loc.id;
  renderNeighbourhood(hubId);
  actionPanel.classList.add("active");
  actionTitle.textContent = loc.name;
  actionSub.textContent = loc.outlet ? "Outlet available here." : "No outlet here.";
  actionLog.textContent = "";
  buildActionButtons(loc);
}
closeActionBtn.addEventListener("click", ()=>{
  actionPanel.classList.remove("active");
});

function buildActionButtons(loc){
  actionButtons.innerHTML = "";

  // Record button
  const recBtn = document.createElement("button");
  recBtn.className = "btn primary";
  recBtn.disabled = state.battery <= 0;
  recBtn.innerHTML = state.isRecording ? "⏹ Stop recording" : "⏺ Record content";
  recBtn.title = state.battery<=0 ? "Camera battery dead — can't record." : "";
  recBtn.addEventListener("click", ()=>{
    state.isRecording = !state.isRecording;
    renderHUD();
    actionLog.textContent = state.isRecording ? "Recording started." : "Recording stopped.";
    buildActionButtons(loc);
  });
  actionButtons.appendChild(recBtn);

  // Recharge via outlet
  if(loc.outlet){
    const chargeBtn = document.createElement("button");
    chargeBtn.className = "btn";
    chargeBtn.disabled = state.battery >= 100;
    chargeBtn.innerHTML = "🔌 Plug in & recharge";
    chargeBtn.addEventListener("click", ()=>{
      state.battery = 100;
      if(state.hasPortableCharger) state.chargerUsesLeft = CHARGER_USES_MAX;
      renderHUD();
      actionLog.textContent = "Phone fully recharged from the outlet.";
      buildActionButtons(loc);
    });
    actionButtons.appendChild(chargeBtn);
  }

  // Portable charger use (works anywhere, no outlet needed)
  if(state.hasPortableCharger){
    const pcBtn = document.createElement("button");
    pcBtn.className = "btn gold";
    const canUse = state.chargerUsesLeft > 0 && state.battery < 100;
    pcBtn.disabled = !canUse;
    pcBtn.innerHTML = `🔋 Use portable charger (${state.chargerUsesLeft} left)`;
    pcBtn.addEventListener("click", ()=>{
      state.battery = 100;
      state.chargerUsesLeft -= 1;
      renderHUD();
      actionLog.textContent = state.chargerUsesLeft>0
        ? `Recharged with the portable charger. ${state.chargerUsesLeft} use(s) left.`
        : `Recharged with the portable charger. It's now empty — needs an outlet to refill.`;
      buildActionButtons(loc);
    });
    actionButtons.appendChild(pcBtn);
  }

  // Buy portable charger at mall
  if(loc.sellsCharger && !state.hasPortableCharger){
    const buyBtn = document.createElement("button");
    buyBtn.className = "btn gold";
    buyBtn.disabled = state.money < CHARGER_PRICE;
    buyBtn.innerHTML = `🛒 Buy portable charger — $${CHARGER_PRICE}`;
    buyBtn.addEventListener("click", ()=>{
      state.money -= CHARGER_PRICE;
      state.hasPortableCharger = true;
      state.chargerUsesLeft = CHARGER_USES_MAX;
      renderHUD();
      actionLog.textContent = "Bought a portable charger. 5 uses before it needs an outlet.";
      buildActionButtons(loc);
    });
    actionButtons.appendChild(buyBtn);
  }
}

// ---------- BATTERY DRAIN LOOP ----------
function drainBattery(gameMinPassed){
  if(state.battery <= 0){ state.battery = 0; return; }
  const rate = BATTERY_DRAIN_PER_GAME_MIN * (state.isRecording ? RECORD_DRAIN_MULTIPLIER : 1);
  state.battery = Math.max(0, state.battery - rate*gameMinPassed);
  if(state.battery<=0 && state.isRecording){
    state.isRecording = false; // recording forced off when battery dies
  }
}

// ---------- MAIN CLOCK LOOP (normal, non-transit time) ----------
// 1 real hour = 10 game hours -> 6 real seconds = 1 game minute.
setInterval(()=>{
  if(!state.inTransit){
    state.gameMin += 1;
    drainBattery(1);
    renderHUD();
    if(actionPanel.classList.contains("active")){
      // refresh buttons in case battery/state changed availability
      const hubLocs = locations[state.currentHub]||[];
      const loc = hubLocs.find(l=>l.id===state.currentLocation);
      if(loc) buildActionButtons(loc);
    }
  }
}, 6000);

// ---------- INIT ----------
renderHUD();
renderTransitMap();
enterNeighbourhood(state.currentHub);
showToast("Prototype build — all sprites are placeholders.");
</script>
