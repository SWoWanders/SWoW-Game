<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Steve's Ottawa — Prototype</title>
<style>
  :root{
    --ink:#1f2318;
    --paper:#eee7d8;
    --paper2:#e2d9c4;
    --line:#8a8060;
    --accent:#c1542c;
    --accent2:#3f6b4f;
    --gold:#b9922a;
    --danger:#a3312a;
    --card:#f6f1e4;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--ink);
    font-family:'Courier New', Courier, monospace;
    color:var(--ink);
    overflow:hidden;
  }
  #app{
    position:relative;
    width:100%;height:100%;
    display:flex;flex-direction:column;
  }

  /* ---------- HUD ---------- */
  #hud{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--ink);
    color:var(--paper);
    padding:10px 14px;
    font-size:14px;
    letter-spacing:0.5px;
    border-top:3px solid var(--gold);
    z-index:10;
    flex-shrink:0;
  }
  #hud .hud-block{display:flex;align-items:center;gap:6px;}
  #hud .label{opacity:0.6;font-size:10px;text-transform:uppercase;}
  #clock-value{font-weight:bold;font-size:16px;letter-spacing:1px;}
  #clock-value.hidden-time{color:var(--danger);}
  #clock-value.hidden-time::after{content:"— : —";}
  #clock-value.hidden-time{font-size:0;}
  #clock-value.hidden-time::after{font-size:16px;}
  .battery-wrap{display:flex;align-items:center;gap:4px;}
  .battery-shell{
    width:34px;height:16px;border:2px solid var(--paper);border-radius:2px;
    position:relative;padding:1px;
  }
  .battery-shell::after{
    content:"";position:absolute;right:-5px;top:4px;width:3px;height:6px;background:var(--paper);
  }
  .battery-fill{height:100%;background:var(--accent2);transition:width .3s;}
  .battery-fill.low{background:var(--gold);}
  .battery-fill.dead{background:var(--danger);width:100% !important;opacity:0.3;}
  #money-value{font-weight:bold;color:var(--gold);}
  #rec-indicator{
    display:flex;align-items:center;gap:5px;font-size:11px;
    padding:3px 8px;border:1px solid var(--paper);border-radius:10px;
  }
  #rec-indicator.active{color:var(--danger);border-color:var(--danger);}
  #rec-dot{width:8px;height:8px;border-radius:50%;background:#555;}
  #rec-indicator.active #rec-dot{background:var(--danger);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* ---------- Views ---------- */
  #view-container{flex:1;position:relative;overflow:hidden;background:var(--paper);}
  .view{
    position:absolute;inset:0;
    display:none;
    flex-direction:column;
  }
  .view.active{display:flex;}

  /* Transit map view */
  #transit-view .view-title{
    padding:10px 14px 4px;font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:.7;
  }
  #transit-canvas-wrap{flex:1;position:relative;}
  #transit-canvas{width:100%;height:100%;display:block;}
  .hub-btn{
    position:absolute;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:3px;
    cursor:pointer;background:none;border:none;
    color:var(--ink);font-family:inherit;
  }
  .hub-btn .dot{
    width:22px;height:22px;border-radius:50%;
    background:var(--card);border:3px solid var(--line);
  }
  .hub-btn.current .dot{background:var(--accent);border-color:var(--ink);}
  .hub-btn .dot-label{font-size:10px;font-weight:bold;background:var(--card);padding:2px 5px;border:1px solid var(--line);border-radius:3px;white-space:nowrap;}

  /* Neighbourhood view */
  #neighbourhood-view .view-title{
    padding:10px 14px 4px;font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:.7;
  }
  #nbhd-canvas-wrap{flex:1;position:relative;padding:10px;}
  .loc-btn{
    position:absolute;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;background:none;border:none;font-family:inherit;
  }
  .loc-icon{
    width:44px;height:44px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;color:var(--paper);
    border:2px solid var(--ink);
    box-shadow:2px 2px 0 rgba(0,0,0,0.15);
  }
  .loc-icon.home{background:#5b7a9a;}
  .loc-icon.museum{background:#7a5b9a;}
  .loc-icon.mall{background:#c1542c;}
  .loc-icon.cafe{background:#8a5a3a;}
  .loc-icon.landmark{background:#3f6b4f;}
  .loc-icon.transit{background:#b9922a;}
  .loc-icon.otrain{background:#2f6e8f;}
  .loc-icon.greenhouse{background:#3f6b4f;}
  .loc-icon.restaurant{background:#c1542c;}
  .loc-label{font-size:10px;font-weight:bold;background:var(--card);padding:2px 5px;border:1px solid var(--line);border-radius:3px;white-space:nowrap;}
  .loc-outlet-badge{
    position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--ink);
    font-size:9px;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--ink);
  }
  #steve-sprite{
    position:absolute;width:28px;height:28px;border-radius:50%;
    background:var(--accent);border:3px solid var(--ink);
    transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;color:var(--paper);font-weight:bold;
    transition:left .4s, top .4s;
    z-index:5;
  }

  /* Walkable grid-mode neighbourhood (RPG-style streets, free movement) */
  #grid-mode-outer{
    flex:1;display:none;position:relative;overflow:hidden;
    background:#1f2318;touch-action:none;
  }
  #grid-mode-wrap{
    position:absolute;top:0;left:0;
    display:grid;
    /* grid-template set inline by JS based on TILE_PX/COLS/ROWS */
    box-shadow:0 0 0 4px var(--ink) inset;
  }
  .gtile{width:100%;height:100%;position:relative;}
  .gtile.road{background:#8f8873;}
  .gtile.sidewalk{background:#d8d0b8;}
  .gtile.building{background:#5b5240;}
  .gtile.institutional{background:#7a7260;}
  .gtile.grass{background:#5f8a5a;}
  .gtile.home,.gtile.farm-entry,.gtile.transit,.gtile.observatory,
  .gtile.museum,.gtile.greenhouse,.gtile.arboretum,.gtile.gardens,.gtile.restaurant,.gtile.park{
    background:#d8d0b8;display:flex;align-items:center;justify-content:center;font-size:14px;
  }
  .gtile.home::after{content:"🏠";}
  .gtile.farm-entry{background:#5f8a5a;}
  .gtile.farm-entry::after{content:"🌾";}
  .gtile.transit::after{content:"🚌";}
  .gtile.observatory{background:#3a4a63;}
  .gtile.observatory::after{content:"🔭";}
  .gtile.museum{background:#7a5b9a;}
  .gtile.museum::after{content:"🏛";}
  .gtile.greenhouse{background:#3f6b4f;}
  .gtile.greenhouse::after{content:"🌿";}
  .gtile.arboretum{background:#4a7a3f;}
  .gtile.arboretum::after{content:"🌳";}
  .gtile.gardens{background:#7a8a3f;}
  .gtile.gardens::after{content:"🌷";}
  .gtile.restaurant{background:#c1542c;}
  .gtile.restaurant::after{content:"🍽";}
  .gtile.park{background:#7fae5f;}
  .gtile.park::after{content:"🪑";}
  .gtile.yard-sale-marker{display:flex;align-items:center;justify-content:center;font-size:14px;}
  .gtile.yard-sale-marker::after{content:"🏷";}
  #grid-steve-sprite{
    position:absolute;width:22px;height:22px;
    transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;
    z-index:6;pointer-events:none;
  }
  #grid-steve-sprite .dot{
    width:100%;height:100%;border-radius:50%;
    background:var(--accent);border:2px solid var(--ink);
  }
  #grid-hint{
    position:absolute;top:8px;left:50%;transform:translateX(-50%);
    background:rgba(31,35,24,0.8);color:var(--paper);font-size:10px;
    padding:4px 10px;border-radius:10px;z-index:9;pointer-events:none;
  }

  /* Travel overlay */
  #travel-overlay{
    position:absolute;inset:0;background:rgba(31,35,24,0.92);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    color:var(--paper);z-index:20;gap:14px;text-align:center;padding:20px;
  }
  #travel-overlay.active{display:flex;}
  #travel-bar-shell{width:70%;max-width:320px;height:10px;background:#3a3f2e;border-radius:6px;overflow:hidden;}
  #travel-bar-fill{height:100%;width:0%;background:var(--gold);}
  #travel-eta{font-size:12px;opacity:.75;}
  #skip-travel-btn{
    margin-top:8px;background:none;border:1px solid var(--paper);color:var(--paper);
    padding:6px 14px;border-radius:4px;font-family:inherit;cursor:pointer;font-size:12px;
  }

  /* Location action panel */
  #action-panel{
    position:absolute;left:0;right:0;bottom:0;
    background:var(--card);border-top:3px solid var(--ink);
    padding:14px;display:none;flex-direction:column;gap:8px;
    max-height:60%;overflow-y:auto;z-index:15;
  }
  #action-panel.active{display:flex;}
  #action-panel h3{margin:0 0 4px;font-size:15px;}
  #action-panel .sub{font-size:11px;opacity:.65;margin-bottom:6px;}
  .action-row{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{
    font-family:inherit;font-size:12px;padding:9px 12px;border-radius:5px;
    border:2px solid var(--ink);background:var(--paper);cursor:pointer;
    display:flex;align-items:center;gap:6px;
  }
  .btn.primary{background:var(--accent2);color:var(--paper);}
  .btn.gold{background:var(--gold);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.close-btn{margin-left:auto;background:none;border:none;font-size:16px;padding:4px 8px;}
  #action-log{font-size:11px;opacity:.7;min-height:14px;}

  /* Toast */
  #toast{
    position:absolute;top:60px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);padding:8px 16px;border-radius:5px;
    font-size:12px;z-index:30;opacity:0;pointer-events:none;transition:opacity .3s;
    border:1px solid var(--gold);
  }
  #toast.show{opacity:1;}

  svg.route-line{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
</style>
</head>
<body>
<div id="app">

  <div id="view-container">

    <!-- TRANSIT MAP VIEW -->
    <div id="transit-view" class="view active">
      <div class="view-title">Transit Map — tap a neighbourhood to travel</div>
      <div id="transit-canvas-wrap">
        <svg class="route-line" id="route-svg"></svg>
        <!-- hub buttons injected by JS -->
      </div>
    </div>

    <!-- NEIGHBOURHOOD VIEW -->
    <div id="neighbourhood-view" class="view">
      <div class="view-title" id="nbhd-title">Neighbourhood</div>
      <div id="nbhd-canvas-wrap">
        <div id="steve-sprite">S</div>
        <!-- location buttons injected by JS (icon mode, used by hubs not yet upgraded to walkable streets) -->
      </div>
      <div id="grid-mode-outer">
        <div id="grid-mode-wrap">
          <div id="grid-steve-sprite"><div class="dot"></div></div>
          <!-- street tiles injected by JS (walkable mode) -->
        </div>
        <div id="grid-hint">Touch &amp; hold, drag to walk</div>
      </div>
    </div>

    <!-- TRAVEL OVERLAY -->
    <div id="travel-overlay">
      <div id="travel-headline">Traveling…</div>
      <div id="travel-bar-shell"><div id="travel-bar-fill"></div></div>
      <div id="travel-eta">0 of 0 min</div>
      <button id="skip-travel-btn">Skip &raquo;</button>
    </div>

    <!-- ACTION PANEL -->
    <div id="action-panel">
      <div class="action-row">
        <h3 id="action-title">Location</h3>
        <button class="btn close-btn" id="close-action-btn">✕</button>
      </div>
      <div class="sub" id="action-sub"></div>
      <div class="action-row" id="action-buttons"></div>
      <div id="action-log"></div>
    </div>

  </div>

  <div id="hud">
    <div class="hud-block">
      <span class="label">TIME</span>
      <span id="clock-value">7:00 AM</span>
    </div>
    <div class="hud-block battery-wrap">
      <span class="label">BATT</span>
      <div class="battery-shell"><div id="battery-fill" class="battery-fill" style="width:100%"></div></div>
      <span id="battery-pct" style="font-size:11px;">100%</span>
    </div>
    <div class="hud-block">
      <span class="label">$</span>
      <span id="money-value">60</span>
    </div>
    <div id="rec-indicator"><span id="rec-dot"></span><span id="rec-label">idle</span></div>
  </div>

  <div id="toast"></div>
</div>

<script>
/* =========================================================

   Placeholder-sprite build. All visuals here (colored dots,
   emoji icons) are stand-ins. See steve_sprite_sheet_template.png
   for the grid to draw real sprites into — cell coordinates
   are referenced in the SPRITE_MAP comment at the bottom.
   ========================================================= */

// ---------- TIME CONFIG ----------
// 1 real hour of normal play = 10 game hours -> 1 game-minute passes every 6 real seconds.
const GAME_MIN_PER_REAL_SEC = 10 / 6 / 10; // = 1/6 game-min per real-sec (10 game-hr/real-hr)
const DAY_START_MIN = 7 * 60;   // 7:00 AM
const DAY_END_MIN   = 23 * 60;  // 11:00 PM curfew (design TBD, placeholder)

// ---------- BATTERY CONFIG ----------
const BATTERY_DRAIN_PER_GAME_MIN = 100 / (10 * 60); // battery lasts ~10 game-hours of normal drain
const RECORD_DRAIN_MULTIPLIER = 2.2; // recording drains faster than idle
const CHARGER_PRICE = 35;
const CHARGER_USES_MAX = 5;

// ---------- WORLD DATA ----------
// Hub layout is stylised, not geographically exact.
const hubs = [
  { id:"carlington", name:"Carlington / Exp. Farm", x:0.10, y:0.72 },

// Simplified "most common route" edges with EXACT placeholder minute costs.
// Replace these numbers with real OC Transpo route data later.
const routes = [
  ["carlington","glebe",15],
  ["carlington","southkeys",18],
  ["carlington","westboro",10],
  ["westboro","lebreton",8],

// ---------- WALKABLE GRID DATA (proof-of-concept: Carlington only) ----------
// Hand-approximated street layout, not exact geodata, but reflects real relative

// Legend:
// '#' = wall/edge (blocked)        'H' = house mass (blocked, residential)

const CARLINGTON_GRID = [

function findTileCoord(ch){
  for(let r=0;r<GRID_ROWS;r++){
    for(let c=0;c<GRID_COLS;c++){
      if(CARLINGTON_GRID[r][c]===ch) return {col:c,row:r};
    }
  }
  return {col:0,row:0};
}
function isWorldWalkable(px,py){

  if(c<0||r<0||c>=GRID_COLS||r>=GRID_ROWS) return false;
  const ch = CARLINGTON_GRID[r][c];
  return ch !== "#" && ch !== "H" && ch !== "B";
}

// ---------- UTIL ----------
function formatClock(min){
  min = Math.floor(min) % (24*60);
  let h = Math.floor(min/60);
  const m = min%60;
  const ampm = h>=12 ? "PM":"AM";
  h = h%12; if(h===0) h=12;
  return `${h}:${m.toString().padStart(2,"0")} ${ampm}`;
}
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>toastEl.classList.remove("show"), 2200);
}
function graph(){
  const g = {};
  hubs.forEach(h=>g[h.id]=[]);
  routes.concat(otrainRoutes).forEach(([a,b,min])=>{
    g[a].push({to:b, min});
    g[b].push({to:a, min});
  });
  return g;
}
const G = graph();
function shortestPath(from,to){
  const dist = {}, prev = {}, visited = new Set();
  hubs.forEach(h=>dist[h.id]=Infinity);
  dist[from]=0;
  while(true){
    let u=null, best=Infinity;
    for(const h of hubs){ if(!visited.has(h.id) && dist[h.id]<best){ best=dist[h.id]; u=h.id; } }
    if(u===null) break;
    if(u===to) break;
    visited.add(u);
    for(const edge of G[u]){
      const nd = dist[u]+edge.min;
      if(nd < dist[edge.to]){ dist[edge.to]=nd; prev[edge.to]=u; }
    }
  }
  if(dist[to]===Infinity) return null;
  const path=[to];
  let cur=to;
  while(cur!==from){ cur=prev[cur]; path.unshift(cur); }
  return { path, totalMin: dist[to] };
}

// ---------- TRAVEL ----------
let travelTimer = null;
function startTravel(destHubId, totalMin, path){
  state.inTransit = true;
  travelOverlay.classList.add("active");
  const destHub = hubs.find(h=>h.id===destHubId);
  travelHeadline.textContent = `Traveling to ${destHub.name}`;
  travelBarFill.style.width = "0%";
  let elapsed = 0;
  travelEta.textContent = `0 of ${totalMin} min`;

  function finish(){
    clearInterval(travelTimer);
    travelOverlay.classList.remove("active");
    state.inTransit = false;
    state.currentHub = destHubId;
    state.currentLocation = null;
    if(GRID_MODE_HUBS.has(destHubId)){
      const arrival = findTileCoord("T");
      steveX = (arrival.col + 0.5) * TILE_PX;
      steveY = (arrival.row + 0.5) * TILE_PX;
      lastTriggerTileKey = null;
    }
    renderTransitMap();
    enterNeighbourhood(destHubId);
  }
  skipTravelBtn.onclick = ()=>{
    // Skip still charges the full exact game-time cost, it just fast-forwards the wait.
    state.gameMin += (totalMin - elapsed);
    drainBattery(totalMin - elapsed);
    finish();
  };

  // Transit charges its EXACT specified minutes to the game clock (no compression/
  // invention of numbers), but animates at a fixed ~250ms-per-game-minute pace so the
  // player isn't stuck waiting in real time. Skip fast-forwards it entirely.
  const MS_PER_TRANSIT_GAME_MIN = 250;
  travelTimer = setInterval(()=>{
    elapsed += 1;
    state.gameMin += 1;
    drainBattery(1);
    renderHUD();
    const pct = Math.min(100, (elapsed/totalMin)*100);
    travelBarFill.style.width = pct+"%";
    travelEta.textContent = `${elapsed} of ${totalMin} min`;
    if(elapsed >= totalMin){
      finish();
    }
  }, MS_PER_TRANSIT_GAME_MIN);
}

const GTILE_CLASS = {
  "#":"building", "H":"building", "B":"institutional", "g":"grass",
  "r":"road", "s":"sidewalk",
  "S":"home", "F":"farm-entry", "T":"transit", "O":"observatory",
  "M":"museum", "G":"greenhouse", "A":"arboretum", "N":"gardens", "J":"restaurant",
  "P":"park",
};
function renderCarlingtonGrid(){
  gridModeWrap.style.gridTemplateColumns = `repeat(${GRID_COLS}, ${TILE_PX}px)`;
  gridModeWrap.style.gridTemplateRows = `repeat(${GRID_ROWS}, ${TILE_PX}px)`;
  gridModeWrap.style.width = (GRID_COLS*TILE_PX)+"px";
  gridModeWrap.style.height = (GRID_ROWS*TILE_PX)+"px";
  gridModeWrap.querySelectorAll(".gtile").forEach(el=>el.remove());
  for(let r=0;r<GRID_ROWS;r++){
    for(let c=0;c<GRID_COLS;c++){
      const ch = CARLINGTON_GRID[r][c];
      const div = document.createElement("div");
      div.className = "gtile " + (GTILE_CLASS[ch]||"road");
      if(yardSaleTile && c===yardSaleTile.col && r===yardSaleTile.row){
        div.classList.add("yard-sale-marker");

      gridModeWrap.insertBefore(div, gridSteveSprite);
    }
  }
  updateSteveVisual();
  applyCamera(computeCamera());
}

function updateSteveVisual(){
  gridSteveSprite.style.left = steveX+"px";
  gridSteveSprite.style.top = steveY+"px";
}

function computeCamera(){
  const rect = gridModeOuter.getBoundingClientRect();
  const vw = rect.width || 1, vh = rect.height || 1;
  const worldW = GRID_COLS*TILE_PX, worldH = GRID_ROWS*TILE_PX;
  let camX = vw/2 - steveX, camY = vh/2 - steveY;
  const minX = Math.min(0, vw-worldW), minY = Math.min(0, vh-worldH);
  camX = Math.max(minX, Math.min(0, camX));
  camY = Math.max(minY, Math.min(0, camY));
  return { x:camX, y:camY, vw, vh };
}
function applyCamera(camera){
  gridModeWrap.style.transform = `translate(${camera.x}px, ${camera.y}px)`;
}

// axis-separated collision so Steve slides along walls instead of sticking
const COLLIDE_RADIUS = 9;
function tryMoveContinuous(dx,dy){
  if(dx!==0){
    const nx = steveX+dx;
    const dir = Math.sign(dx);
    if(isWorldWalkable(nx+dir*COLLIDE_RADIUS, steveY-COLLIDE_RADIUS) &&
       isWorldWalkable(nx+dir*COLLIDE_RADIUS, steveY+COLLIDE_RADIUS)){
      steveX = nx;
    }
  }
  if(dy!==0){
    const ny = steveY+dy;
    const dir = Math.sign(dy);
    if(isWorldWalkable(steveX-COLLIDE_RADIUS, ny+dir*COLLIDE_RADIUS) &&
       isWorldWalkable(steveX+COLLIDE_RADIUS, ny+dir*COLLIDE_RADIUS)){
      steveY = ny;
    }
  }
}

const TILE_TO_LOCATION_ID = {
  S: "steve-house",
  F: "exp-farm",
  O: "dominion-observatory",
  M: "food-ag-museum",
  G: "tropical-greenhouse",
  A: "dominion-arboretum",
  N: "ornamental-gardens",
  J: "jamaican-takeout",
  P: "neighbourhood-park",
};

// Yard sale: occasionally, one random house in the neighbourhood is holding a yard
// sale — a higher-value recording opportunity than the (usually) uneventful streets.
// Picked once per session from a handful of sidewalk spots that front a house.
const YARD_SALE_CANDIDATES = [
  {col:2, row:3}, {col:2, row:8}, {col:2, row:16},
  {col:2, row:23}, {col:2, row:28}, {col:2, row:35}, {col:2, row:42},
];
const yardSaleActive = Math.random() < 0.5; // not every day has one
const yardSaleTile = yardSaleActive
  ? YARD_SALE_CANDIDATES[Math.floor(Math.random()*YARD_SALE_CANDIDATES.length)]
  : null;
function checkTileTrigger(){
  const c = Math.floor(steveX/TILE_PX), r = Math.floor(steveY/TILE_PX);
  if(c<0||r<0||c>=GRID_COLS||r>=GRID_ROWS) return;
  const ch = CARLINGTON_GRID[r][c];
  const onYardSale = yardSaleTile && c===yardSaleTile.col && r===yardSaleTile.row;
  if(ch==="T" || TILE_TO_LOCATION_ID[ch] || onYardSale){
    const key = c+","+r;
    if(lastTriggerTileKey !== key){
      lastTriggerTileKey = key;
      isDragging = false;
      hideLeash();
      if(ch==="T"){
        showToast("Boarding transit…");
        leaveToTransitMap();
      } else if(onYardSale){
        const loc = locations.carlington.find(l=>l.id==="yard-sale");
        if(loc) openLocation("carlington", loc);
      } else {
        const loc = locations.carlington.find(l=>l.id===TILE_TO_LOCATION_ID[ch]);
        if(loc) openLocation("carlington", loc);
      }
    }
  } else {
    lastTriggerTileKey = null;
  }
}

  const rect = gridModeOuter.getBoundingClientRect();
  pointerScreen.x = e.clientX - rect.left;
  pointerScreen.y = e.clientY - rect.top;
}
function hideLeash(){ /* leash visual removed by request; movement logic unaffected */ }
function showLeash(){ /* leash visual removed by request; movement logic unaffected */ }

gridModeOuter.addEventListener("pointerdown", (e)=>{
  if(!GRID_MODE_HUBS.has(state.currentHub)) return;
  if(actionPanel.classList.contains("active")) return;
  isDragging = true;
  updatePointerScreen(e);
  gridHint.style.display = "none";
  try{ gridModeOuter.setPointerCapture(e.pointerId); }catch(err){}
});
gridModeOuter.addEventListener("pointermove", (e)=>{
  if(isDragging) updatePointerScreen(e);
});
["pointerup","pointercancel","pointerleave"].forEach(evt=>{
  gridModeOuter.addEventListener(evt, ()=>{
    isDragging = false;
    hideLeash();
  });
});

// Keyboard fallback for desktop testing — continuous (not grid-snapped) movement
const KEY_TO_DIR = {
  ArrowUp:"up", w:"up", W:"up",
  ArrowDown:"down", s:"down", S:"down",
  ArrowLeft:"left", a:"left", A:"left",
  ArrowRight:"right", d:"right", D:"right",
};
window.addEventListener("keydown", (e)=>{
  if(!nbhdView.classList.contains("active")) return;
  if(!GRID_MODE_HUBS.has(state.currentHub)) return;
  const dir = KEY_TO_DIR[e.key];
  if(dir){ e.preventDefault(); keysPressed.add(dir); }
});
window.addEventListener("keyup", (e)=>{
  const dir = KEY_TO_DIR[e.key];
  if(dir) keysPressed.delete(dir);
});

// ---------- MAIN GAME LOOP (movement + camera, runs continuously) ----------
let lastFrameTime = null;
function gameFrame(now){
  if(lastFrameTime===null) lastFrameTime = now;
  const dt = Math.min(0.05, (now-lastFrameTime)/1000);
  lastFrameTime = now;

  const gridModeActive = nbhdView.classList.contains("active")
    && GRID_MODE_HUBS.has(state.currentHub)
    && !state.inTransit
    && !actionPanel.classList.contains("active");

  if(gridModeActive){
    const camera = computeCamera();
    const steveScreenX = steveX + camera.x, steveScreenY = steveY + camera.y;

    let dirX=0, dirY=0, speedFactor=0;
    if(isDragging){
      const vx = pointerScreen.x - steveScreenX, vy = pointerScreen.y - steveScreenY;
      const dist = Math.hypot(vx,vy);
      if(dist > 3){
        dirX = vx/dist; dirY = vy/dist;
        speedFactor = Math.min(1, dist/LEASH_SLOWDOWN_RADIUS);
        showLeash();
      } else {
        hideLeash();
      }
    } else if(keysPressed.size>0){
      let kx=0, ky=0;
      if(keysPressed.has("up")) ky-=1;
      if(keysPressed.has("down")) ky+=1;
      if(keysPressed.has("left")) kx-=1;
      if(keysPressed.has("right")) kx+=1;
      const len = Math.hypot(kx,ky);
      if(len>0){ dirX=kx/len; dirY=ky/len; speedFactor=1; }
    }

    if(speedFactor>0){
      const dist = MAX_SPEED*speedFactor*dt;
      tryMoveContinuous(dirX*dist, dirY*dist);
    }

    updateSteveVisual();
    applyCamera(camera);
    checkTileTrigger();
  }

  requestAnimationFrame(gameFrame);
}
requestAnimationFrame(gameFrame);

// ---------- LOCATION ACTIONS ----------
function openLocation(hubId, loc){
  if(loc.type === "transit" || loc.type === "otrain"){
    showToast(loc.type === "otrain" ? "Boarding the O-Train…" : "Boarding transit…");
    leaveToTransitMap();
    return;
  }
  state.currentLocation = loc.id;
  if(!GRID_MODE_HUBS.has(hubId)){
    renderNeighbourhood(hubId);
  }
  actionPanel.classList.add("active");
  actionTitle.textContent = loc.name;
  const outletLine = loc.outlet ? "Outlet available here." : "No outlet here.";
  const valueLabel = { low:"Low", medium:"Medium", high:"High" }[loc.recordingValue];
  const valueLine = valueLabel ? ` Content potential: ${valueLabel}.` : "";
  actionSub.textContent = outletLine + valueLine;
  actionLog.textContent = loc.flavor || "";
  buildActionButtons(loc);
}
closeActionBtn.addEventListener("click", ()=>{
  actionPanel.classList.remove("active");
});

function buildActionButtons(loc){
  actionButtons.innerHTML = "";

  // Record button
  const recBtn = document.createElement("button");
  recBtn.className = "btn primary";
  recBtn.disabled = state.battery <= 0;
  recBtn.innerHTML = state.isRecording ? "⏹ Stop recording" : "⏺ Record content";
  recBtn.title = state.battery<=0 ? "Camera battery dead — can't record." : "";
  recBtn.addEventListener("click", ()=>{
    state.isRecording = !state.isRecording;
    renderHUD();
    actionLog.textContent = state.isRecording ? "Recording started." : "Recording stopped.";
    buildActionButtons(loc);
  });
  actionButtons.appendChild(recBtn);

  // Recharge via outlet
  if(loc.outlet){
    const chargeBtn = document.createElement("button");
    chargeBtn.className = "btn";
    chargeBtn.disabled = state.battery >= 100;
    chargeBtn.innerHTML = "🔌 Plug in & recharge";
    chargeBtn.addEventListener("click", ()=>{
      state.battery = 100;
      if(state.hasPortableCharger) state.chargerUsesLeft = CHARGER_USES_MAX;
      renderHUD();
      actionLog.textContent = "Phone fully recharged from the outlet.";
      buildActionButtons(loc);
    });
    actionButtons.appendChild(chargeBtn);
  }

  // Portable charger use (works anywhere, no outlet needed)
  if(state.hasPortableCharger){
    const pcBtn = document.createElement("button");
    pcBtn.className = "btn gold";
    const canUse = state.chargerUsesLeft > 0 && state.battery < 100;
    pcBtn.disabled = !canUse;
    pcBtn.innerHTML = `🔋 Use portable charger (${state.chargerUsesLeft} left)`;
    pcBtn.addEventListener("click", ()=>{
      state.battery = 100;
      state.chargerUsesLeft -= 1;
      renderHUD();
      actionLog.textContent = state.chargerUsesLeft>0
        ? `Recharged with the portable charger. ${state.chargerUsesLeft} use(s) left.`
        : `Recharged with the portable charger. It's now empty — needs an outlet to refill.`;
      buildActionButtons(loc);
    });
    actionButtons.appendChild(pcBtn);
  }

  // Buy portable charger at mall
  if(loc.sellsCharger && !state.hasPortableCharger){
    const buyBtn = document.createElement("button");
    buyBtn.className = "btn gold";
    buyBtn.disabled = state.money < CHARGER_PRICE;
    buyBtn.innerHTML = `🛒 Buy portable charger — $${CHARGER_PRICE}`;
    buyBtn.addEventListener("click", ()=>{
      state.money -= CHARGER_PRICE;
      state.hasPortableCharger = true;
      state.chargerUsesLeft = CHARGER_USES_MAX;
      renderHUD();
      actionLog.textContent = "Bought a portable charger. 5 uses before it needs an outlet.";
      buildActionButtons(loc);
    });
    actionButtons.appendChild(buyBtn);
  }
}

// ---------- BATTERY DRAIN LOOP ----------
function drainBattery(gameMinPassed){
  if(state.battery <= 0){ state.battery = 0; return; }
  const rate = BATTERY_DRAIN_PER_GAME_MIN * (state.isRecording ? RECORD_DRAIN_MULTIPLIER : 1);
  state.battery = Math.max(0, state.battery - rate*gameMinPassed);
  if(state.battery<=0 && state.isRecording){
    state.isRecording = false; // recording forced off when battery dies
  }
}

// ---------- MAIN CLOCK LOOP (normal, non-transit time) ----------
// 1 real hour = 10 game hours -> 6 real seconds = 1 game minute.
setInterval(()=>{
  if(!state.inTransit){
    state.gameMin += 1;
    drainBattery(1);
    renderHUD();
    if(actionPanel.classList.contains("active")){
      // refresh buttons in case battery/state changed availability
      const hubLocs = locations[state.currentHub]||[];
      const loc = hubLocs.find(l=>l.id===state.currentLocation);
      if(loc) buildActionButtons(loc);
    }
  }
}, 6000);

// ---------- INIT ----------
hideLeash();
renderHUD();
renderTransitMap();
enterNeighbourhood(state.currentHub);
showToast("Prototype build — all sprites are placeholders.");
</script>
